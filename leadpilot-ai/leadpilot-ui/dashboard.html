<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LeadPilot AI - Real Estate Lead Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; }
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-badge {
            @apply px-3 py-1 rounded-full text-xs font-semibold;
        }
        .status-new { @apply bg-blue-100 text-blue-700; }
        .status-contacted { @apply bg-amber-100 text-amber-700; }
        .status-followup { @apply bg-purple-100 text-purple-700; }
        .status-closed { @apply bg-green-100 text-green-700; }
        
        /* Mobile sidebar overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 40;
        }
        .sidebar-overlay.active {
            display: block;
        }
        
        /* Responsive table */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Mobile card view */
        .mobile-card {
            display: none;
        }
        
        @media (max-width: 1024px) {
            .desktop-table {
                display: none;
            }
            .mobile-card {
                display: block;
            }
        }
        
        /* Touch-friendly buttons */
        .touch-btn {
            min-height: 44px;
            min-width: 44px;
        }
        
        /* Dark mode */
        body.dark { background: #0f172a; }
        body.dark .glass { 
            background: rgba(30, 41, 59, 0.9); 
            border-color: rgba(255, 255, 255, 0.1);
        }
        body.dark .bg-white { background-color: #1e293b; }
        body.dark .text-gray-900 { color: #f1f5f9; }
        body.dark .text-gray-600 { color: #94a3b8; }
        body.dark .text-gray-500 { color: #64748b; }
        body.dark .border-gray-200 { border-color: #334155; }
        body.dark .bg-gray-50 { background-color: #0f172a; }
        body.dark .hover\:bg-gray-50:hover { background-color: #334155; }
        body.dark input, body.dark select {
            background-color: #334155;
            color: #f1f5f9;
            border-color: #475569;
        }
        body.dark .status-new { @apply bg-blue-900 text-blue-200; }
        body.dark .status-contacted { @apply bg-amber-900 text-amber-200; }
        body.dark .status-followup { @apply bg-purple-900 text-purple-200; }
        body.dark .status-closed { @apply bg-green-900 text-green-200; }
        
        /* Chart containers */
        .chart-container {
            position: relative;
            height: 200px;
        }
        
        /* AI Score Ring */
        .score-ring {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            position: relative;
        }
        
        .score-ring::before {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: white;
        }
        
        .score-ring span {
            position: relative;
            z-index: 1;
        }
        
        .score-hot { background: conic-gradient(#dc2626 var(--score), #e5e7eb 0); }
        .score-warm { background: conic-gradient(#f59e0b var(--score), #e5e7eb 0); }
        .score-cold { background: conic-gradient(#3b82f6 var(--score), #e5e7eb 0); }
        .score-nurture { background: conic-gradient(#6b7280 var(--score), #e5e7eb 0); }
        
        /* Progress bars */
        .progress-bar {
            height: 8px;
            border-radius: 4px;
            background: #e5e7eb;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlide 0.3s ease;
        }
        
        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Activity timeline */
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e5e7eb;
        }
        
        .timeline-item {
            position: relative;
            padding-bottom: 20px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #3b82f6;
            border: 2px solid white;
        }
        
        /* Quick actions */
        .quick-action {
            transition: all 0.2s ease;
        }
        
        .quick-action:hover {
            transform: scale(1.05);
        }
        
        /* Stats trend indicator */
        .trend-up { color: #10b981; }
        .trend-down { color: #ef4444; }
        .trend-neutral { color: #6b7280; }
    </style>
</head>
<body class="min-h-screen">
    <!-- Mobile Menu Button -->
    <button id="mobileMenuBtn" class="lg:hidden fixed top-4 left-4 z-50 p-3 rounded-xl bg-white shadow-lg touch-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars text-gray-700"></i>
    </button>
    
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 glass z-50 border-r border-gray-200 transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
                    <i class="fas fa-rocket text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xl text-gray-900">LeadPilot</h1>
                    <p class="text-xs text-gray-500">AI-Powered CRM</p>
                </div>
            </div>
            
            <nav class="space-y-1">
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 text-blue-700 font-medium">
                    <i class="fas fa-users w-5"></i>
                    <span>Leads</span>
                    <span class="ml-auto bg-blue-600 text-white text-xs px-2 py-0.5 rounded-full" id="leadCount">0</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-colors">
                    <i class="fas fa-chart-line w-5"></i>
                    <span>Analytics</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-colors">
                    <i class="fas fa-cog w-5"></i>
                    <span>Settings</span>
                </a>
            </nav>
        </div>
        
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-200">
            <button onclick="toggleTheme()" id="themeToggle" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-colors">
                <i class="fas fa-moon w-5" id="themeIcon"></i>
                <span>Dark Mode</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="lg:ml-64 p-4 lg:p-8 pt-20 lg:pt-8">
        <!-- Header -->
        <header class="flex flex-col lg:flex-row lg:justify-between lg:items-center gap-4 mb-8">
            <div>
                <h2 class="text-2xl lg:text-3xl font-bold text-gray-900">Leads</h2>
                <p class="text-gray-500 mt-1 text-sm lg:text-base">Manage and track your real estate leads</p>
            </div>
            <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="Search leads..." 
                        class="pl-11 pr-4 py-3 w-full sm:w-64 lg:w-80 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all"
                        oninput="searchLeads(this.value)">
                </div>
                <button onclick="addLead()" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl flex items-center justify-center gap-2 transition-colors touch-btn">
                    <i class="fas fa-plus"></i>
                    <span class="hidden sm:inline">Add Lead</span>
                    <span class="sm:hidden">Add</span>
                </button>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-6 mb-8">
            <div class="bg-white rounded-2xl p-4 lg:p-6 card-hover border border-gray-100">
                <div class="flex items-center justify-between mb-3 lg:mb-4">
                    <div class="w-10 h-10 lg:w-12 lg:h-12 rounded-xl bg-blue-100 flex items-center justify-center">
                        <i class="fas fa-users text-blue-600 text-lg lg:text-xl"></i>
                    </div>
                    <span class="text-green-500 text-xs lg:text-sm font-medium">+12%</span>
                </div>
                <h3 class="text-2xl lg:text-3xl font-bold text-gray-900" id="totalLeads">0</h3>
                <p class="text-gray-500 text-xs lg:text-sm">Total Leads</p>
            </div>
            
            <div class="bg-white rounded-2xl p-4 lg:p-6 card-hover border border-gray-100">
                <div class="flex items-center justify-between mb-3 lg:mb-4">
                    <div class="w-10 h-10 lg:w-12 lg:h-12 rounded-xl bg-amber-100 flex items-center justify-center">
                        <i class="fas fa-clock text-amber-600 text-lg lg:text-xl"></i>
                    </div>
                    <span class="text-gray-400 text-xs lg:text-sm font-medium">Pending</span>
                </div>
                <h3 class="text-2xl lg:text-3xl font-bold text-gray-900" id="newLeads">0</h3>
                <p class="text-gray-500 text-xs lg:text-sm">New Leads</p>
            </div>
            
            <div class="bg-white rounded-2xl p-4 lg:p-6 card-hover border border-gray-100">
                <div class="flex items-center justify-between mb-3 lg:mb-4">
                    <div class="w-10 h-10 lg:w-12 lg:h-12 rounded-xl bg-purple-100 flex items-center justify-center">
                        <i class="fas fa-phone text-purple-600 text-lg lg:text-xl"></i>
                    </div>
                    <span class="text-gray-400 text-xs lg:text-sm font-medium">Active</span>
                </div>
                <h3 class="text-2xl lg:text-3xl font-bold text-gray-900" id="contactedLeads">0</h3>
                <p class="text-gray-500 text-xs lg:text-sm">Contacted</p>
            </div>
            
            <div class="bg-white rounded-2xl p-4 lg:p-6 card-hover border border-gray-100">
                <div class="flex items-center justify-between mb-3 lg:mb-4">
                    <div class="w-10 h-10 lg:w-12 lg:h-12 rounded-xl bg-green-100 flex items-center justify-center">
                        <i class="fas fa-check-circle text-green-600 text-lg lg:text-xl"></i>
                    </div>
                    <span class="text-gray-400 text-xs lg:text-sm font-medium">Done</span>
                </div>
                <h3 class="text-2xl lg:text-3xl font-bold text-gray-900" id="closedLeads">0</h3>
                <p class="text-gray-500 text-xs lg:text-sm">Closed</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap items-center gap-2 lg:gap-3 mb-6">
            <button onclick="filterByStatus('all')" class="filter-btn px-4 lg:px-5 py-2 rounded-full text-xs lg:text-sm font-medium bg-blue-600 text-white transition-all touch-btn" data-filter="all">
                All
            </button>
            <button onclick="filterByStatus('new')" class="filter-btn px-4 lg:px-5 py-2 rounded-full text-xs lg:text-sm font-medium bg-white text-gray-600 border border-gray-200 hover:border-blue-300 transition-all touch-btn" data-filter="new">
                New
            </button>
            <button onclick="filterByStatus('contacted')" class="filter-btn px-4 lg:px-5 py-2 rounded-full text-xs lg:text-sm font-medium bg-white text-gray-600 border border-gray-200 hover:border-blue-300 transition-all touch-btn" data-filter="contacted">
                Contacted
            </button>
            <button onclick="filterByStatus('follow-up')" class="filter-btn px-4 lg:px-5 py-2 rounded-full text-xs lg:text-sm font-medium bg-white text-gray-600 border border-gray-200 hover:border-blue-300 transition-all touch-btn" data-filter="follow-up">
                Follow-up
            </button>
            <button onclick="filterByStatus('closed')" class="filter-btn px-4 lg:px-5 py-2 rounded-full text-xs lg:text-sm font-medium bg-white text-gray-600 border border-gray-200 hover:border-blue-300 transition-all touch-btn" data-filter="closed">
                Closed
            </button>
        </div>

        <!-- Leads Table (Desktop) -->
        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden desktop-table">
            <div class="table-container">
                <table class="w-full min-w-[800px]">
                    <thead>
                        <tr class="border-b border-gray-200 bg-gray-50">
                            <th class="text-left px-4 lg:px-6 py-3 lg:py-4 text-xs font-semibold text-gray-500 uppercase">Lead</th>
                            <th class="text-left px-4 lg:px-6 py-3 lg:py-4 text-xs font-semibold text-gray-500 uppercase">Phone</th>
                            <th class="text-left px-4 lg:px-6 py-3 lg:py-4 text-xs font-semibold text-gray-500 uppercase">Budget</th>
                            <th class="text-left px-4 lg:px-6 py-3 lg:py-4 text-xs font-semibold text-gray-500 uppercase">Location</th>
                            <th class="text-left px-4 lg:px-6 py-3 lg:py-4 text-xs font-semibold text-gray-500 uppercase">Status</th>
                            <th class="text-left px-4 lg:px-6 py-3 lg:py-4 text-xs font-semibold text-gray-500 uppercase">Date</th>
                            <th class="text-left px-4 lg:px-6 py-3 lg:py-4 text-xs font-semibold text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leadsTable" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="7" class="px-6 py-12 text-center text-gray-400">
                                <i class="fas fa-spinner fa-spin text-2xl mb-3"></i>
                                <p>Loading leads...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Mobile Cards -->
        <div id="mobileLeads" class="mobile-card space-y-4">
            <!-- Mobile cards rendered here -->
        </div>
    </main>

    <script>
        const API_BASE_URL = 'http://localhost:80';
        let allLeads = [];
        let currentFilter = 'all';

        // Fetch leads
        async function fetchLeads() {
            try {
                const response = await fetch(`${API_BASE_URL}/leads`);
                if (!response.ok) throw new Error('Failed to fetch');
                allLeads = await response.json();
                updateStats();
                renderLeads(allLeads);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('leadsTable').innerHTML = `
                    <tr><td colspan="7" class="px-6 py-12 text-center text-red-500">
                        <i class="fas fa-exclamation-circle text-2xl mb-3"></i>
                        <p>Error loading leads. Check server.</p>
                    </td></tr>
                `;
            }
        }

        // Update stats
        function updateStats() {
            document.getElementById('leadCount').textContent = allLeads.length;
            document.getElementById('totalLeads').textContent = allLeads.length;
            document.getElementById('newLeads').textContent = allLeads.filter(l => l.status === 'new').length;
            document.getElementById('contactedLeads').textContent = allLeads.filter(l => l.status === 'contacted').length;
            document.getElementById('closedLeads').textContent = allLeads.filter(l => l.status === 'closed').length;
        }

        // Render leads
        function renderLeads(leads) {
            const tbody = document.getElementById('leadsTable');
            const mobileContainer = document.getElementById('mobileLeads');
            
            if (!leads || leads.length === 0) {
                const emptyHtml = `
                    <tr><td colspan="7" class="px-6 py-12 text-center text-gray-400">
                        <i class="fas fa-inbox text-4xl mb-3"></i>
                        <p>No leads found</p>
                    </td></tr>
                `;
                tbody.innerHTML = emptyHtml;
                mobileContainer.innerHTML = `
                    <div class="text-center py-12 text-gray-400">
                        <i class="fas fa-inbox text-4xl mb-3"></i>
                        <p>No leads found</p>
                    </div>
                `;
                return;
            }

            // Desktop table
            tbody.innerHTML = leads.map(lead => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-4 lg:px-6 py-3 lg:py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 lg:w-10 lg:h-10 rounded-full bg-gradient-to-br from-blue-400 to-purple-500 flex items-center justify-center text-white font-semibold text-xs lg:text-sm">
                                ${getInitials(lead.phone)}
                            </div>
                            <div>
                                <p class="font-semibold text-gray-900 text-sm">Lead from ${lead.phone}</p>
                                <p class="text-xs text-gray-500 truncate max-w-[150px] lg:max-w-[200px]">${lead.message || 'No message'}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-4 lg:px-6 py-3 lg:py-4 text-gray-600 text-sm">${lead.phone}</td>
                    <td class="px-4 lg:px-6 py-3 lg:py-4">
                        <span class="font-semibold text-gray-900 text-sm">${lead.budget || '-'}</span>
                    </td>
                    <td class="px-4 lg:px-6 py-3 lg:py-4 text-gray-600 text-sm">${lead.location || '-'}</td>
                    <td class="px-4 lg:px-6 py-3 lg:py-4">
                        <select onchange="updateLeadStatus('${lead.id}', this.value)" 
                            class="status-badge status-${lead.status} cursor-pointer outline-none text-xs">
                            <option value="new" ${lead.status === 'new' ? 'selected' : ''}>New</option>
                            <option value="contacted" ${lead.status === 'contacted' ? 'selected' : ''}>Contacted</option>
                            <option value="follow-up" ${lead.status === 'follow-up' ? 'selected' : ''}>Follow-up</option>
                            <option value="closed" ${lead.status === 'closed' ? 'selected' : ''}>Closed</option>
                        </select>
                    </td>
                    <td class="px-4 lg:px-6 py-3 lg:py-4 text-gray-500 text-xs">${formatDate(lead.created_at)}</td>
                    <td class="px-4 lg:px-6 py-3 lg:py-4">
                        <button class="text-gray-400 hover:text-red-500 transition-colors p-2 touch-btn" onclick="deleteLead('${lead.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            
            // Mobile cards
            mobileContainer.innerHTML = leads.map(lead => `
                <div class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-400 to-purple-500 flex items-center justify-center text-white font-semibold text-sm">
                                ${getInitials(lead.phone)}
                            </div>
                            <div>
                                <p class="font-semibold text-gray-900 text-sm">${lead.phone}</p>
                                <p class="text-xs text-gray-500">${formatDate(lead.created_at)}</p>
                            </div>
                        </div>
                        <select onchange="updateLeadStatus('${lead.id}', this.value)" 
                            class="status-badge status-${lead.status} cursor-pointer outline-none text-xs">
                            <option value="new" ${lead.status === 'new' ? 'selected' : ''}>New</option>
                            <option value="contacted" ${lead.status === 'contacted' ? 'selected' : ''}>Contacted</option>
                            <option value="follow-up" ${lead.status === 'follow-up' ? 'selected' : ''}>Follow-up</option>
                            <option value="closed" ${lead.status === 'closed' ? 'selected' : ''}>Closed</option>
                        </select>
                    </div>
                    <p class="text-sm text-gray-600 mb-3 line-clamp-2">${lead.message || 'No message'}</p>
                    <div class="flex items-center justify-between">
                        <div class="flex gap-4 text-sm">
                            <span class="text-gray-900 font-semibold">${lead.budget || '-'}</span>
                            <span class="text-gray-500">${lead.location || '-'}</span>
                        </div>
                        <button class="text-gray-400 hover:text-red-500 transition-colors p-2 touch-btn" onclick="deleteLead('${lead.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Get initials
        function getInitials(phone) {
            return phone ? phone.slice(-2).toUpperCase() : '??';
        }

        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'Just now';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        // Filter by status
        function filterByStatus(status) {
            currentFilter = status;
            
            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === status) {
                    btn.className = 'filter-btn px-5 py-2 rounded-full text-sm font-medium bg-blue-600 text-white transition-all';
                } else {
                    btn.className = 'filter-btn px-5 py-2 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200 hover:border-blue-300 transition-all';
                }
            });
            
            if (status === 'all') {
                renderLeads(allLeads);
            } else {
                renderLeads(allLeads.filter(l => l.status === status));
            }
        }

        // Search leads
        function searchLeads(query) {
            if (!query) {
                filterByStatus(currentFilter);
                return;
            }
            const filtered = allLeads.filter(l => 
                l.phone?.includes(query) ||
                l.location?.toLowerCase().includes(query.toLowerCase()) ||
                l.message?.toLowerCase().includes(query.toLowerCase())
            );
            renderLeads(filtered);
        }

        // Update lead status
        async function updateLeadStatus(id, status) {
            try {
                await fetch(`${API_BASE_URL}/leads/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                fetchLeads();
            } catch (error) {
                alert('Failed to update status');
            }
        }

        // Add lead
        async function addLead() {
            const phone = prompt('Enter phone number:');
            if (!phone) return;
            const message = prompt('Enter requirement:');
            if (!message) return;

            try {
                await fetch(`${API_BASE_URL}/webhook`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        entry: [{ changes: [{ value: { messages: [{ from: phone, text: { body: message } }] } }] }]
                    })
                });
                fetchLeads();
            } catch (error) {
                alert('Failed to add lead');
            }
        }

        // Delete lead (optional - if you want to add DELETE endpoint)
        async function deleteLead(id) {
            if (!confirm('Delete this lead?')) return;
            // Implement delete if you have the endpoint
        }

        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            const btn = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            if (isDark) {
                btn.innerHTML = '<i class="fas fa-sun w-5 text-amber-500"></i><span>Light Mode</span>';
            } else {
                btn.innerHTML = '<i class="fas fa-moon w-5"></i><span>Dark Mode</span>';
            }
        }

        // Load theme
        function loadTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark');
                document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun w-5 text-amber-500"></i><span>Light Mode</span>';
            }
        }

        // Sidebar toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('active');
        }
        
        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.getElementById('mobileMenuBtn');
            if (window.innerWidth < 1024 && 
                !sidebar.contains(e.target) && 
                !menuBtn.contains(e.target) &&
                !sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }
        });

        // Initialize
        loadTheme();
        fetchLeads();
        setInterval(fetchLeads, 10000);
    </script>
</body>
