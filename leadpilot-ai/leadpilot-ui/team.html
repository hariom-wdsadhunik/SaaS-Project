<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team - LeadPilot AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 min-h-screen fixed left-0 top-0">
            <div class="p-6 border-b border-gray-200">
                <a href="/dashboard" class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-rocket text-white"></i>
                    </div>
                    <span class="text-xl font-bold">LeadPilot</span>
                </a>
            </div>
            <nav class="p-4 space-y-1">
                <a href="/dashboard" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl transition">
                    <i class="fas fa-home w-5"></i> Dashboard
                </a>
                <a href="/calendar" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl transition">
                    <i class="fas fa-calendar w-5"></i> Calendar
                </a>
                <a href="/tasks" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl transition">
                    <i class="fas fa-tasks w-5"></i> Tasks
                </a>
                <a href="/deals" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl transition">
                    <i class="fas fa-handshake w-5"></i> Deals
                </a>
                <a href="/team" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl font-medium">
                    <i class="fas fa-users w-5"></i> Team
                </a>
                <a href="/settings" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl transition">
                    <i class="fas fa-cog w-5"></i> Settings
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-64 p-8">
            <div class="max-w-5xl mx-auto">
                <!-- Header -->
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900">Team Management</h1>
                        <p class="text-gray-500 mt-1">Manage your team members and permissions</p>
                    </div>
                    <button onclick="openInviteModal()" id="btn-invite" class="px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-600 text-white rounded-xl font-medium hover:opacity-90 transition">
                        <i class="fas fa-user-plus mr-2"></i>Invite Member
                    </button>
                </div>

                <!-- Team Info -->
                <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
                    <div class="flex items-center gap-6">
                        <div class="w-16 h-16 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center">
                            <i class="fas fa-users text-white text-2xl"></i>
                        </div>
                        <div class="flex-1">
                            <h2 class="text-2xl font-bold text-gray-900" id="team-name">Loading...</h2>
                            <p class="text-gray-500" id="team-description">Team description</p>
                        </div>
                        <div class="text-right">
                            <p class="text-3xl font-bold text-gray-900" id="team-member-count">0</p>
                            <p class="text-sm text-gray-500">Members</p>
                        </div>
                    </div>
                </div>

                <!-- Members Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="members-grid">
                    <!-- Members will be loaded here -->
                </div>
                <div id="members-empty" class="hidden text-center py-12 bg-white rounded-2xl shadow-sm">
                    <i class="fas fa-users text-6xl text-gray-300 mb-4"></i>
                    <p class="text-gray-500">No team members yet</p>
                    <button onclick="openInviteModal()" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                        Invite your first member
                    </button>
                </div>

                <!-- Activity Log -->
                <div class="mt-8 bg-white rounded-2xl shadow-sm p-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Recent Activity</h3>
                    <div id="activity-list" class="space-y-4">
                        <!-- Activity will be loaded here -->
                    </div>
                    <div id="activity-empty" class="hidden text-center py-6 text-gray-500">
                        No recent activity
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Invite Modal -->
    <div id="invite-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold">Invite Team Member</h2>
                    <button onclick="closeInviteModal()" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            <form id="invite-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email *</label>
                    <input type="email" id="invite-email" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="colleague@company.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Name *</label>
                    <input type="text" id="invite-name" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="John Doe" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Role</label>
                    <select id="invite-role" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500">
                        <option value="agent">Agent</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="bg-blue-50 rounded-xl p-4">
                    <p class="text-sm text-blue-700">
                        <i class="fas fa-info-circle mr-2"></i>
                        An invitation email will be sent with a temporary password.
                    </p>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeInviteModal()" class="flex-1 px-4 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200">
                        Cancel
                    </button>
                    <button type="submit" class="flex-1 px-4 py-3 bg-gradient-to-r from-blue-500 to-purple-600 text-white rounded-xl font-medium hover:opacity-90">
                        <i class="fas fa-paper-plane mr-2"></i>Send Invite
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let token = localStorage.getItem('token');
        let teamData = null;
        let currentUser = null;

        if (!token) {
            window.location.href = '/login';
        }

        async function loadCurrentUser() {
            try {
                const res = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const { user } = await res.json();
                    currentUser = user;
                    if (user.role !== 'admin') {
                        document.getElementById('btn-invite').style.display = 'none';
                    }
                }
            } catch (err) {
                console.error('Load user error:', err);
            }
        }

        async function loadTeam() {
            try {
                const res = await fetch(`${API_BASE}/team`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    teamData = await res.json();
                    renderTeam();
                } else {
                    // User not in a team
                    document.getElementById('team-name').textContent = 'No Team';
                    document.getElementById('team-description').textContent = 'Create or join a team to collaborate';
                    document.getElementById('members-empty').classList.remove('hidden');
                    document.getElementById('btn-invite').style.display = 'none';
                }
            } catch (err) {
                console.error('Load team error:', err);
            }
        }

        function renderTeam() {
            if (!teamData || !teamData.team) return;

            document.getElementById('team-name').textContent = teamData.team.name;
            document.getElementById('team-description').textContent = teamData.team.description || 'Real Estate Team';
            document.getElementById('team-member-count').textContent = teamData.members?.length || 0;

            const grid = document.getElementById('members-grid');
            const empty = document.getElementById('members-empty');

            if (!teamData.members || teamData.members.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                grid.innerHTML = teamData.members.map(member => `
                    <div class="bg-white rounded-xl shadow-sm p-5">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white font-bold text-lg">
                                ${(member.name || 'U').charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h4 class="font-semibold text-gray-900">${member.name}</h4>
                                <p class="text-sm text-gray-500">${member.email}</p>
                            </div>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="px-3 py-1 text-xs rounded-full ${member.role === 'admin' ? 'bg-purple-100 text-purple-600' : 'bg-blue-100 text-blue-600'}">
                                ${member.role === 'admin' ? 'Admin' : 'Agent'}
                            </span>
                            ${currentUser?.role === 'admin' && member.id !== currentUser?.id ? `
                                <div class="flex gap-2">
                                    <button onclick="changeRole('${member.id}')" class="text-sm text-blue-600 hover:underline">Change Role</button>
                                    <button onclick="removeMember('${member.id}')" class="text-sm text-red-600 hover:underline">Remove</button>
                                </div>
                            ` : ''}
                        </div>
                        <div class="mt-3 pt-3 border-t border-gray-100 text-xs text-gray-500">
                            <i class="fas fa-clock mr-1"></i>
                            Joined: ${new Date(member.created_at).toLocaleDateString()}
                        </div>
                    </div>
                `).join('');
            }

            // Render activity
            if (teamData.activities && teamData.activities.length > 0) {
                document.getElementById('activity-empty').classList.add('hidden');
                document.getElementById('activity-list').innerHTML = teamData.activities.map(activity => `
                    <div class="flex items-start gap-4 p-3 bg-gray-50 rounded-xl">
                        <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-user text-blue-600 text-sm"></i>
                        </div>
                        <div class="flex-1">
                            <p class="text-sm text-gray-900">
                                <strong>${activity.user?.name || 'Unknown'}</strong> ${activity.description || activity.action}
                            </p>
                            <p class="text-xs text-gray-500 mt-1">${new Date(activity.created_at).toLocaleString()}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('activity-list').innerHTML = '';
                document.getElementById('activity-empty').classList.remove('hidden');
            }
        }

        function openInviteModal() {
            document.getElementById('invite-form').reset();
            document.getElementById('invite-modal').classList.remove('hidden');
        }

        function closeInviteModal() {
            document.getElementById('invite-modal').classList.add('hidden');
        }

        document.getElementById('invite-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                email: document.getElementById('invite-email').value,
                name: document.getElementById('invite-name').value,
                role: document.getElementById('invite-role').value
            };

            try {
                const res = await fetch(`${API_BASE}/team/invite`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    closeInviteModal();
                    alert('Invitation sent successfully!');
                    loadTeam();
                } else {
                    const err = await res.json();
                    alert('Error: ' + err.error);
                }
            } catch (err) {
                console.error('Invite error:', err);
                alert('Failed to send invitation');
            }
        });

        async function removeMember(userId) {
            if (!confirm('Are you sure you want to remove this member?')) return;

            try {
                const res = await fetch(`${API_BASE}/team/members/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    loadTeam();
                } else {
                    const err = await res.json();
                    alert('Error: ' + err.error);
                }
            } catch (err) {
                console.error('Remove member error:', err);
            }
        }

        async function changeRole(userId) {
            const newRole = prompt('Enter new role (admin/agent):');
            if (!['admin', 'agent'].includes(newRole)) return;

            try {
                const res = await fetch(`${API_BASE}/team/members/${userId}/role`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ role: newRole })
                });

                if (res.ok) {
                    loadTeam();
                } else {
                    const err = await res.json();
                    alert('Error: ' + err.error);
                }
            } catch (err) {
                console.error('Change role error:', err);
            }
        }

        loadCurrentUser();
        loadTeam();
    </script>
</body>
</html>
