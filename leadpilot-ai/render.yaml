services:
  - type: web
    name: leadpilot-ai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PHONE_ID
        sync: false
